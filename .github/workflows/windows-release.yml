name: Build Windows Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 now

jobs:
  build-windows:
    name: Build Flutter Windows App
    runs-on: windows-latest

    steps:
      # 1. Check out your source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Flutter — use latest stable, no pinned version
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'   # Always picks the latest stable Flutter
          cache: true

      # 3. Print Flutter version for debugging
      - name: Flutter version info
        run: flutter --version

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Analyze code (non-fatal — shows warnings but won't stop build)
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 6. Build the Windows release
      - name: Build Windows release
        run: flutter build windows --release --verbose

      # 7. Upload the built .exe folder as a downloadable artifact
      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: st-george-pos-windows
          path: build/windows/x64/runner/Release/
          retention-days: 30
